name: Release Go

on:
  push:
    tags:
      - "go/v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-go-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-go:
    name: Release Go module
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: go

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go 1.26.x
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          cache-dependency-path: go/go.sum

      - name: Validate release tag
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^go/v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Go release tag: $TAG_NAME"
            exit 1
          fi
          RELEASE_VERSION="${TAG_NAME#go/}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Download Dependencies
        run: go mod download

      - name: Check Formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint (includes license headers)
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0 run

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/go/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $TAG_NAME"
          else
            gh release create "$TAG_NAME" \
              --title "mobilityid-go ${RELEASE_VERSION}" \
              --generate-notes
          fi
