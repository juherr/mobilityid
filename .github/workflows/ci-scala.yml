name: CI Scala

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'scala/**'
      - '.github/workflows/ci-scala.yml'
  pull_request:
    paths:
      - 'scala/**'
      - '.github/workflows/ci-scala.yml'

permissions:
  contents: read

concurrency:
  group: ci-scala-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scala:
    name: Scala (JDK 21, Scala ${{ matrix.scala-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        scala-version: [2.12.21, 2.13.18, 3.3.7, 3.8.1]

    defaults:
      run:
        working-directory: scala

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6

      - name: Setup JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@dd1ef7d7798fab5ce802a6adab3b782817b8c2d0 # v1

      - name: Validate License Headers
        run: sbt ++${{ matrix.scala-version }} headerCheck

      - name: Test
        run: sbt ++${{ matrix.scala-version }} clean test
