name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-java:
    name: Release Java to Maven Central
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6

      - name: Setup JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6

      - name: Resolve release version from tag
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid global release tag: $TAG_NAME"
            exit 1
          fi
          RELEASE_VERSION="${TAG_NAME#v}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Pre-release checks
        run: |
          test -n "${{ secrets.MAVEN_CENTRAL_PORTAL_URL }}"
          test -n "${{ secrets.MAVEN_CENTRAL_USERNAME }}"
          test -n "${{ secrets.MAVEN_CENTRAL_PASSWORD }}"
          test -n "${{ secrets.SIGNING_KEY }}"
          test -n "${{ secrets.SIGNING_PASSWORD }}"

      - name: Verify release build
        run: |
          ./gradlew \
            -PreleaseVersion="${RELEASE_VERSION}" \
            -PmavenCentralPortalUrl="${{ secrets.MAVEN_CENTRAL_PORTAL_URL }}" \
            -PmavenCentralUsername="${{ secrets.MAVEN_CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.MAVEN_CENTRAL_PASSWORD }}" \
            -PsigningKey="${{ secrets.SIGNING_KEY }}" \
            -PsigningPassword="${{ secrets.SIGNING_PASSWORD }}" \
            clean check javadocJar sourcesJar publishToMavenLocal

      - name: Publish release
        run: |
          ./gradlew \
            -PreleaseVersion="${RELEASE_VERSION}" \
            -PmavenCentralPortalUrl="${{ secrets.MAVEN_CENTRAL_PORTAL_URL }}" \
            -PmavenCentralUsername="${{ secrets.MAVEN_CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.MAVEN_CENTRAL_PASSWORD }}" \
            -PsigningKey="${{ secrets.SIGNING_KEY }}" \
            -PsigningPassword="${{ secrets.SIGNING_PASSWORD }}" \
            publish

  release-ts:
    name: Release TypeScript to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node 24
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
          working-directory: ts
          registry-url: "https://registry.npmjs.org"

      - name: Resolve release version from tag
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid global release tag: $TAG_NAME"
            exit 1
          fi
          RELEASE_VERSION="${TAG_NAME#v}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"

      - name: Pre-release checks
        run: test -n "${{ secrets.NPM_TOKEN }}"

      - name: Validate package
        run: |
          vp check
          vp test
          vp exec eslint "src/**/*.ts" "test/**/*.ts" --max-warnings 0
          vp pack

      - name: Set release version
        run: bun pm pkg set version="${RELEASE_VERSION}"

      - name: Publish release
        shell: bash
        run: |
          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          bun publish --access public --tag "${NPM_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
