name: CI PHP

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'php/**'
      - '.github/workflows/ci-php.yml'
  pull_request:
    paths:
      - 'php/**'
      - '.github/workflows/ci-php.yml'

permissions:
  contents: read

concurrency:
  group: ci-php-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    defaults:
      run:
        working-directory: php

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_mysql gd intl
          tools: composer
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --no-progress

      - name: Run Checks (Format check, Analyse, Test)
        run: composer check
