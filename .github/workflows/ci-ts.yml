name: CI TypeScript

on:
  push:
    branches:
      - main
      - master
    paths:
      - "ts/**"
      - ".github/workflows/ci-ts.yml"
  pull_request:
    paths:
      - "ts/**"
      - ".github/workflows/ci-ts.yml"

permissions:
  contents: read

concurrency:
  group: ci-ts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TypeScript (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24", "25"]

    defaults:
      run:
        working-directory: ts

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+ and Node ${{ matrix.node-version }}
        uses: voidzero-dev/setup-vp@237a7eda494c3466dcb53e9f067142b9218d64a1 # v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true
          working-directory: ts

      - name: Check
        run: vp check

      - name: Test
        run: vp test

      - name: Build
        run: vp pack

      - name: Check license headers
        run: vp exec bun run lint

      - name: Package dry-run
        run: vp exec bun pm pack --dry-run
